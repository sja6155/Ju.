<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漢字 암기장</title>
<style>
:root {
  --ink: #1a0a00;
  --paper: #f5efe3;
  --red: #c0392b;
  --gold: #b8860b;
  --gold-light: rgba(184,134,11,0.12);
  --faded: #8b7355;
  --card-bg: #fdf8f0;
  --shadow: rgba(26,10,0,0.15);
  --green: #27ae60;
  --blue: #2980b9;
  --font-sans: 'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕','NanumGothic','나눔고딕',sans-serif;
  --font-serif: 'ApMyungjo','Apple Myungjo','Batang','바탕','NanumMyeongjo','나눔명조',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--paper);
  font-family:var(--font-sans);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(139,115,85,0.07) 31px,rgba(139,115,85,0.07) 32px);
}

header{
width:100%;padding:18px 20px 12px;text-align:center;
border-bottom:2px solid var(--gold);background:var(--card-bg);
box-shadow:0 2px 12px var(--shadow);position:sticky;top:0;z-index:200;
}
header h1{font-family:var(--font-serif);font-size:1.5rem;font-weight:900;color:var(--ink);letter-spacing:.1em;}
header p{font-size:.72rem;color:var(--faded);margin-top:3px;}

.tabs{
display:flex;gap:6px;padding:12px 14px 0;
max-width:720px;width:100%;margin:0 auto;flex-wrap:wrap;justify-content:center;
}
.tab{
padding:5px 13px;border-radius:20px;border:1.5px solid var(--gold);
background:transparent;color:var(--gold);font-size:.72rem;
font-family:var(--font-sans);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab.active,.tab:hover{background:var(--gold);color:#fff;}

.controls{
display:flex;gap:8px;padding:10px 14px;
max-width:720px;width:100%;margin:0 auto;align-items:center;flex-wrap:wrap;
}
.count-badge{font-size:.72rem;color:var(--faded);margin-left:auto;}
.shuffle-btn{
padding:5px 14px;border-radius:20px;border:1.5px solid var(--red);
background:transparent;color:var(--red);font-size:.72rem;
font-family:var(--font-sans);cursor:pointer;transition:all .2s;
}
.shuffle-btn:hover{background:var(--red);color:#fff;}
.mode-toggle{display:flex;background:rgba(139,115,85,0.12);border-radius:20px;padding:3px;}
.mode-btn{
padding:5px 11px;border-radius:17px;border:none;
background:transparent;color:var(--faded);font-size:.72rem;
font-family:var(--font-sans);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.mode-btn.active{background:var(--gold);color:#fff;}

/* PANELS */
.panel{display:none;width:100%;max-width:500px;margin:0 auto;padding:10px 14px 40px;}
.panel.active{display:block;}
#flashcard-mode.panel.active{display:flex;flex-direction:column;align-items:center;}
#quiz-mode.panel.active{display:flex;flex-direction:column;align-items:center;}
#list-mode.panel.active{display:block;max-width:700px;}

/* FLASHCARD */
.progress-bar{width:100%;height:4px;background:rgba(139,115,85,.2);border-radius:2px;margin-bottom:14px;}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s;}
.card-container{width:100%;perspective:1000px;cursor:pointer;}
.card{width:100%;min-height:250px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);}
.card.flipped{transform:rotateY(180deg);}
.card-face{
position:absolute;width:100%;min-height:250px;backface-visibility:hidden;
border-radius:16px;background:var(--card-bg);
box-shadow:0 6px 28px var(--shadow),inset 0 0 0 1.5px rgba(184,134,11,.25);
display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;
}
.card-face.back{transform:rotateY(180deg);background:#fff8ec;}
.card-category{font-size:.62rem;color:var(--faded);letter-spacing:.15em;margin-bottom:10px;}
.card-hanja{font-family:var(--font-serif);font-size:4.8rem;font-weight:900;color:var(--ink);line-height:1;margin-bottom:8px;text-shadow:2px 2px 0 rgba(184,134,11,.12);}
.card-hint{font-size:.66rem;color:var(--faded);margin-top:14px;}
.card-reading{font-size:1.5rem;color:var(--red);font-weight:700;margin-bottom:6px;letter-spacing:.1em;}
.card-meaning{font-size:1rem;color:var(--ink);font-weight:500;}
.card-pair{font-family:var(--font-serif);font-size:.82rem;color:var(--faded);margin-top:8px;}
.nav-row{display:flex;gap:12px;margin-top:18px;align-items:center;}
.nav-btn{
width:50px;height:50px;border-radius:50%;border:2px solid var(--gold);
background:var(--card-bg);color:var(--gold);font-size:1.1rem;
cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.nav-btn:hover{background:var(--gold);color:#fff;}
.card-num{font-size:.78rem;color:var(--faded);min-width:58px;text-align:center;}
.known-btn{
margin-top:14px;padding:8px 22px;border-radius:20px;
border:2px solid var(--green);background:transparent;color:var(--green);
font-size:.78rem;font-family:var(--font-sans);cursor:pointer;transition:all .2s;
}
.known-btn:hover{background:var(--green);color:#fff;}
.known-count{font-size:.72rem;color:var(--green);margin-top:6px;}
.flip-hint{font-size:.65rem;color:var(--faded);margin-top:5px;}

/* QUIZ TYPE BAR */
.quiz-type-bar{
display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;justify-content:center;width:100%;
}
.qtype-btn{
padding:6px 13px;border-radius:20px;border:1.5px solid var(--blue);
background:transparent;color:var(--blue);font-size:.72rem;
font-family:var(--font-sans);cursor:pointer;transition:all .2s;
}
.qtype-btn.active,.qtype-btn:hover{background:var(--blue);color:#fff;}

/* QUIZ CARD */
.quiz-card{
width:100%;border-radius:16px;background:var(--card-bg);
box-shadow:0 6px 28px var(--shadow),inset 0 0 0 1.5px rgba(184,134,11,.2);
padding:24px 18px;display:flex;flex-direction:column;align-items:center;
}
.quiz-prompt-label{font-size:.62rem;color:var(--faded);letter-spacing:.12em;margin-bottom:8px;text-align:center;}
.quiz-prompt-hanja{font-family:var(--font-serif);font-size:4rem;font-weight:900;color:var(--ink);text-shadow:2px 2px 0 rgba(184,134,11,.12);line-height:1;margin-bottom:6px;}
.quiz-prompt-text{font-size:1.15rem;color:var(--ink);font-weight:600;margin:3px 0;text-align:center;}
.quiz-sub{font-size:.8rem;color:var(--faded);margin-bottom:8px;}

.quiz-input-row{display:flex;gap:8px;width:100%;margin-top:10px;}
.quiz-input{
flex:1;padding:10px 14px;border-radius:10px;
border:1.5px solid rgba(184,134,11,.35);background:#fff;
font-size:1rem;font-family:var(--font-sans);color:var(--ink);outline:none;
}
.quiz-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.12);}
.quiz-submit{
padding:10px 16px;border-radius:10px;border:none;
background:var(--gold);color:#fff;font-size:.85rem;
font-family:var(--font-sans);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.quiz-submit:hover{background:#a0740a;}

/* CANVAS */
.canvas-wrap{
position:relative;margin-top:10px;
border:2px solid rgba(184,134,11,.4);border-radius:12px;
background:#fff;overflow:hidden;touch-action:none;cursor:crosshair;
width:100%;max-width:260px;
}
.canvas-wrap canvas{display:block;width:100%;height:auto;}
.canvas-guide{
position:absolute;inset:0;pointer-events:none;
display:flex;align-items:center;justify-content:center;
font-family:var(--font-serif);font-size:5rem;font-weight:900;
color:rgba(184,134,11,.08);user-select:none;
}
.canvas-btns{display:flex;gap:8px;margin-top:8px;width:100%;max-width:260px;}
.canvas-btn{
flex:1;padding:8px;border-radius:10px;border:1.5px solid var(--faded);
background:transparent;color:var(--faded);font-size:.74rem;
font-family:var(--font-sans);cursor:pointer;transition:all .2s;
}
.canvas-btn:hover{background:var(--faded);color:#fff;}
.canvas-btn.primary{border-color:var(--gold);color:var(--gold);}
.canvas-btn.primary:hover{background:var(--gold);color:#fff;}

/* FEEDBACK */
.quiz-feedback{
margin-top:12px;width:100%;padding:11px 15px;border-radius:12px;
font-size:.88rem;font-weight:600;text-align:center;display:none;line-height:1.5;
}
.quiz-feedback.correct{background:rgba(39,174,96,.1);color:var(--green);border:1.5px solid rgba(39,174,96,.28);}
.quiz-feedback.wrong{background:rgba(192,57,43,.09);color:var(--red);border:1.5px solid rgba(192,57,43,.22);}
.quiz-feedback.neutral{background:var(--gold-light);color:var(--gold);border:1.5px solid rgba(184,134,11,.3);}

.quiz-nav-row{display:flex;align-items:center;margin-top:12px;width:100%;}
.quiz-score{font-size:.75rem;color:var(--faded);}

.hint-reveal{margin-top:10px;font-size:.76rem;color:var(--faded);cursor:pointer;text-decoration:underline dotted;}
.hint-text{display:none;margin-top:5px;font-size:.82rem;color:var(--gold);font-weight:600;}

/* RESULT */
.result-screen{
width:100%;text-align:center;padding:28px 20px;
background:var(--card-bg);border-radius:16px;box-shadow:0 6px 28px var(--shadow);
}
.result-screen h2{font-family:var(--font-serif);font-size:1.4rem;color:var(--ink);margin-bottom:10px;}
.result-big{font-size:3rem;font-weight:900;color:var(--gold);line-height:1;}
.result-sub{font-size:.85rem;color:var(--faded);margin-top:8px;}
.result-btn{
margin-top:16px;margin-right:6px;padding:9px 22px;border-radius:20px;
border:2px solid var(--gold);background:var(--gold);color:#fff;
font-size:.85rem;font-family:var(--font-sans);cursor:pointer;transition:all .2s;
}
.result-btn.outline{background:transparent;color:var(--gold);}
.result-btn:hover{background:#a0740a;border-color:#a0740a;color:#fff;}

/* LIST */
.list-group{margin-bottom:22px;}
.list-group-title{
font-family:var(--font-serif);font-size:.82rem;color:var(--gold);
letter-spacing:.12em;margin-bottom:7px;padding-bottom:4px;
border-bottom:1px solid rgba(184,134,11,.22);
}
.list-item{
display:flex;align-items:center;gap:12px;padding:9px 13px;
background:var(--card-bg);border-radius:10px;margin-bottom:5px;
box-shadow:0 2px 8px rgba(26,10,0,.05);border:1px solid rgba(184,134,11,.15);
cursor:pointer;transition:all .15s;
}
.list-item:hover{transform:translateX(3px);border-color:var(--gold);}
.list-hanja{font-family:var(--font-serif);font-size:1.9rem;font-weight:700;color:var(--ink);min-width:42px;text-align:center;}
.list-info{flex:1;}
.list-reading{font-size:.88rem;color:var(--red);font-weight:600;}
.list-meaning{font-size:.76rem;color:var(--faded);margin-top:2px;}
.list-pair-tag{font-size:.63rem;background:var(--gold-light);color:var(--gold);padding:2px 7px;border-radius:10px;}
</style>

</head>
<body>

<header>
  <h1>漢字 암기장</h1>
  <p>한문의 기초 · 병렬관계 · 반의관계 · 속담</p>
</header>

<div class="tabs" id="tabs"></div>

<div class="controls">
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('flash')">플래시카드</button>
    <button class="mode-btn" onclick="setMode('quiz')">퀴즈</button>
    <button class="mode-btn" onclick="setMode('list')">목록</button>
  </div>
  <button class="shuffle-btn" onclick="shuffle()">🔀 섞기</button>
  <span class="count-badge" id="count-badge"></span>
</div>

<!-- FLASHCARD -->

<div id="flashcard-mode" class="panel active">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="card-container" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face front">
        <div class="card-category" id="fc-cat"></div>
        <div class="card-hanja" id="fc-hanja"></div>
        <div class="card-hint">탭하여 뒤집기 👆</div>
      </div>
      <div class="card-face back">
        <div class="card-category" id="fc-cat-back"></div>
        <div class="card-reading" id="fc-reading"></div>
        <div class="card-meaning" id="fc-meaning"></div>
        <div class="card-pair" id="fc-pair"></div>
      </div>
    </div>
  </div>
  <div class="flip-hint" id="flip-hint"></div>
  <div class="nav-row">
    <button class="nav-btn" onclick="fcPrev()">←</button>
    <div class="card-num" id="fc-num"></div>
    <button class="nav-btn" onclick="fcNext()">→</button>
  </div>
  <button class="known-btn" onclick="fcKnown()">✓ 외웠어요</button>
  <div class="known-count" id="known-count"></div>
</div>

<!-- QUIZ -->

<div id="quiz-mode" class="panel">
  <div class="quiz-type-bar">
    <button class="qtype-btn active" onclick="setQuizType('read')">음 맞추기</button>
    <button class="qtype-btn" onclick="setQuizType('meaning')">뜻 맞추기</button>
    <button class="qtype-btn" onclick="setQuizType('draw')">한자 쓰기 ✏️</button>
    <button class="qtype-btn" onclick="setQuizType('hanja')">한자 입력</button>
  </div>
  <div id="quiz-body" style="width:100%;"></div>
</div>

<!-- LIST -->

<div id="list-mode" class="panel">
  <div id="list-content"></div>
</div>

/* ─── STATE ─── */
let currentCategory = "기초 한자";
let currentWords = [];
let viewMode = 'flash';
let fcIndex = 0, fcFlipped = false, fcKnownSet = new Set();
let qType = 'read';
let qWords = [], qIndex = 0, qCorrect = 0, qAnswered = false, qDone = false;
let drawCanvas, drawCtx, isDrawing = false, lastX = 0, lastY = 0;

/* ─── INIT ─── */
function init() {
  buildTabs();
  loadWords();
}

function buildTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  const mk = (label, cat) => {
    const b = document.createElement('button');
    b.className = 'tab' + (currentCategory === cat ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { currentCategory = cat; fcIndex = 0; fcKnownSet.clear(); init(); };
    el.appendChild(b);
  };
  mk('전체', '__all__');
  Object.keys(ALL_WORDS).forEach(c => mk(c, c));
}

function loadWords() {
  if (currentCategory === '__all__') {
    currentWords = Object.entries(ALL_WORDS).flatMap(([cat, ws]) => ws.map(w => ({...w, cat})));
  } else {
    currentWords = (ALL_WORDS[currentCategory] || []).map(w => ({...w, cat: currentCategory}));
  }
  const seen = new Set();
  currentWords = currentWords.filter(w => {
    const k = w.h + w.r;
    if (seen.has(k)) return false; 
    seen.add(k); return true;
  });
  document.getElementById('count-badge').textContent = `총 ${currentWords.length}개`;
  fcRender();
  renderList();
  qWords = [...currentWords];
  if (viewMode === 'quiz') { qIndex=0; qCorrect=0; qAnswered=false; qDone=false; renderQuiz(); }
}

function shuffle() {
  currentWords = [...currentWords].sort(() => Math.random() - .5);
  fcIndex = 0; fcKnownSet.clear();
  qWords = [...currentWords]; qIndex=0; qCorrect=0; qAnswered=false; qDone=false;
  fcRender(); renderList();
  if (viewMode === 'quiz') renderQuiz();
}

function setMode(m) {
  viewMode = m;
  document.getElementById('flashcard-mode').classList.toggle('active', m === 'flash');
  document.getElementById('quiz-mode').classList.toggle('active', m === 'quiz');
  document.getElementById('list-mode').classList.toggle('active', m === 'list');
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', ['flash','quiz','list'][i] === m);
  });
  if (m === 'quiz') {
    qWords = [...currentWords]; qIndex=0; qCorrect=0; qAnswered=false; qDone=false;
    renderQuiz();
  }
}

/* ─── FLASHCARD ─── */
function fcRender() {
  if (!currentWords.length) return;
  const w = currentWords[fcIndex];
  fcFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('fc-cat').textContent = w.cat;
  document.getElementById('fc-cat-back').textContent = w.cat;
  document.getElementById('fc-hanja').textContent = w.h;
  document.getElementById('fc-reading').textContent = w.r;
  document.getElementById('fc-meaning').textContent = w.m;
  document.getElementById('fc-pair').textContent = w.pair ? '관련: ' + w.pair : '';
  document.getElementById('fc-num').textContent = `${fcIndex + 1} / ${currentWords.length}`;
  document.getElementById('progress-fill').style.width = ((fcIndex+1) / currentWords.length * 100) + '%';
  document.getElementById('known-count').textContent = `외운 단어: ${fcKnownSet.size} / ${currentWords.length}`;
  document.getElementById('flip-hint').textContent = '';
}
function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('card').classList.toggle('flipped');
  document.getElementById('flip-hint').textContent = fcFlipped ? '탭하여 앞면으로' : '';
}
function fcNext() { fcIndex = (fcIndex + 1) % currentWords.length; fcRender(); }
function fcPrev() { fcIndex = (fcIndex - 1 + currentWords.length) % currentWords.length; fcRender(); }
function fcKnown() {
  fcKnownSet.add(fcIndex);
  document.getElementById('known-count').textContent = `외운 단어: ${fcKnownSet.size} / ${currentWords.length}`;
  fcNext();

/* ─── QUIZ ─── */
function setQuizType(t) {
  qType = t;
  document.querySelectorAll('.qtype-btn').forEach((b, i) => {
    b.classList.toggle('active', ['read','meaning','draw','hanja'][i] === t);
  });
  qWords = [...currentWords]; qIndex=0; qCorrect=0; qAnswered=false; qDone=false;
  renderQuiz();

function renderQuiz() {
  const el = document.getElementById('quiz-body');

    el.innerHTML = '<p style="text-align:center;color:var(--faded);padding:30px">단어가 없습니다.</p>';

  const w = qWords[qIndex];
  let label = '', mainHTML = '';

  if (qType === 'read') {
    label = '이 한자의 음(소리)을 입력하세요';
    mainHTML = `<div class="quiz-prompt-hanja">${w.h}</div>
                <div class="quiz-sub">뜻: ${w.m}</div>`;
  } else if (qType === 'meaning') {
    label = '이 한자의 뜻을 입력하세요';
    mainHTML = `<div class="quiz-prompt-hanja">${w.h}</div>
                <div class="quiz-sub">음: ${w.r}</div>`;
  } else if (qType === 'draw') {
    label = '음과 뜻을 보고 한자를 직접 써보세요';
    mainHTML = `<div class="quiz-prompt-text">음: <b style="color:var(--red)">${w.r}</b></div>
                <div class="quiz-prompt-text">뜻: <b style="color:var(--ink)">${w.m}</b></div>`;
  } else {
    label = '음과 뜻을 보고 한자를 입력하세요';
    mainHTML = `<div class="quiz-prompt-text">음: <b style="color:var(--red)">${w.r}</b></div>
                <div class="quiz-prompt-text">뜻: <b style="color:var(--ink)">${w.m}</b></div>`;
  }

  const inputSection = qType === 'draw' ? `
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="draw-canvas" width="260" height="260"></canvas>
      <div class="canvas-guide" id="canvas-guide">${w.h}</div>
    </div>
    <div class="canvas-btns">
      <button class="canvas-btn" onclick="clearCanvas()">🗑 지우기</button>
      <button class="canvas-btn primary" onclick="quizDrawReveal()">✓ 정답 확인</button>
    </div>
  ` : `
    <div class="quiz-input-row">
      <input class="quiz-input" id="quiz-input" type="text"
        placeholder="${qType==='hanja' ? '한자를 입력 (예: 花)' : qType==='read' ? '음 입력 (예: 화)' : '뜻 입력 (예: 꽃)'}"
        autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="" onkeydown="if(event.key==='Enter')quizCheck()">
      <button class="quiz-submit" onclick="quizCheck()">확인</button>
    </div>
  `;

  el.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-prompt-label">${label}</div>
      ${mainHTML}
      ${inputSection}
      <div class="quiz-feedback" id="qfb"></div>
      <div class="hint-reveal" id="hint-toggle" onclick="toggleHint()">💡 힌트 보기</div>
      <div class="hint-text" id="hint-text">
        ${qType==='read' ? '정답 음: '+w.r :
          qType==='meaning' ? '정답 뜻: '+w.m :
          qType==='draw' ? '한자: '+w.h :
          '정답 한자: '+w.h}
      </div>
    </div>
    <div class="quiz-nav-row">
      <div class="quiz-score" id="qscore">맞은 개수: ${qCorrect} / ${qIndex}</div>
      <div style="flex:1"></div>
      <span style="font-size:.72rem;color:var(--faded)">${qIndex+1} / ${qWords.length}</span>
    </div>
  `;

  if (qType === 'draw') {
    setTimeout(initCanvas, 30);
  } else {
    setTimeout(() => { const inp = document.getElementById('quiz-input'); if (inp) inp.focus(); }, 50);
  }
}

function quizCheck() {
  if (qAnswered) { advanceQuiz(); return; }
  const inp = document.getElementById('quiz-input');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  inp.disabled = true;

  const w = qWords[qIndex];
  let correct = false;
  if (qType === 'read') {
    correct = val === w.r;
  } else if (qType === 'meaning') {
    const answers = w.m.split('/').map(s => s.trim());
    correct = answers.some(a => val === a || val.replace(/\s/g,'') === a.replace(/\s/g,''));
  } else if (qType === 'hanja') {
    correct = val === w.h;
  }

  if (correct) qCorrect++;
  qAnswered = true;

  const fb = document.getElementById('qfb');
  fb.style.display = 'block';
  if (correct) {
    fb.className = 'quiz-feedback correct';
    fb.innerHTML = `⭕ 정답! &nbsp;<span style="font-family:var(--font-serif);font-size:1.1rem">${w.h}</span> = <b>${w.r}</b> (${w.m})`;
  } else {
    fb.className = 'quiz-feedback wrong';
    fb.innerHTML = `❌ 오답 &nbsp; 정답: <span style="font-family:var(--font-serif);font-size:1.1rem">${w.h}</span> = <b>${w.r}</b> (${w.m})`;
  }
  document.getElementById('qscore').textContent = `맞은 개수: ${qCorrect} / ${qIndex+1}`;
  setTimeout(advanceQuiz, 1500);
}

function quizDrawReveal() {
  if (qAnswered) { advanceQuiz(); return; }
  const w = qWords[qIndex];
  qAnswered = true;

  // show answer on canvas guide clearly
  const g = document.getElementById('canvas-guide');
  if (g) { g.style.color = 'rgba(184,134,11,0.45)'; }

  const fb = document.getElementById('qfb');
  fb.style.display = 'block';
  fb.className = 'quiz-feedback neutral';
  fb.innerHTML = `
    정답: <span style="font-family:var(--font-serif);font-size:1.4rem;font-weight:900">${w.h}</span>
    <br><small style="font-weight:400">스스로 채점하세요</small><br>
    <button onclick="selfMark(true)" style="margin:6px 4px 0;padding:5px 16px;border-radius:12px;border:1.5px solid var(--green);background:transparent;color:var(--green);cursor:pointer;font-family:var(--font-sans);font-size:.8rem">⭕ 맞았어요</button>
    <button onclick="selfMark(false)" style="margin:6px 4px 0;padding:5px 16px;border-radius:12px;border:1.5px solid var(--red);background:transparent;color:var(--red);cursor:pointer;font-family:var(--font-sans);font-size:.8rem">❌ 틀렸어요</button>
  `;
}

function selfMark(ok) {
  if (ok) qCorrect++;
  document.getElementById('qscore').textContent = `맞은 개수: ${qCorrect} / ${qIndex+1}`;
  advanceQuiz();
}

function advanceQuiz() {
  qAnswered = false;
  qIndex++;
  if (qIndex >= qWords.length) { qDone = true; }
  renderQuiz();
}

function toggleHint() {
  const ht = document.getElementById('hint-text');
  const tg = document.getElementById('hint-toggle');
  if (!ht || !tg) return;
  const shown = ht.style.display === 'block';
  ht.style.display = shown ? 'none' : 'block';
  tg.textContent = shown ? '💡 힌트 보기' : '💡 힌트 숨기기';
}

function renderResult(el) {
  const pct = qWords.length ? Math.round(qCorrect / qWords.length * 100) : 0;
  const emoji = pct >= 90 ? '🎉' : pct >= 70 ? '👍' : pct >= 50 ? '💪' : '📖';
  const msg = pct >= 90 ? '완벽해요!' : pct >= 70 ? '잘했어요!' : pct >= 50 ? '조금만 더 연습해요' : '다시 한 번 도전해봐요';
  el.innerHTML = `
    <div class="result-screen">
      <h2>퀴즈 완료! ${emoji}</h2>
      <div class="result-big">${qCorrect}<span style="font-size:1.5rem;font-weight:400;color:var(--faded)"> / ${qWords.length}</span></div>
      <div style="font-size:1.8rem;font-weight:700;color:var(--gold);margin-top:4px">${pct}점</div>
      <div class="result-sub">${msg}</div>
      <div style="margin-top:16px">
        <button class="result-btn" onclick="restartQuiz()">다시 풀기</button>
        <button class="result-btn outline" onclick="restartShuffle()">🔀 섞어서 다시</button>
      </div>
    </div>`;
}

function restartQuiz() {
  qWords = [...currentWords]; qIndex=0; qCorrect=0; qAnswered=false; qDone=false;
  renderQuiz();
}
function restartShuffle() {
  qWords = [...currentWords].sort(() => Math.random() - .5);
  qIndex=0; qCorrect=0; qAnswered=false; qDone=false;
  renderQuiz();
}

/* ─── CANVAS ─── */
function initCanvas() {
  drawCanvas = document.getElementById('draw-canvas');
  if (!drawCanvas) return;
  drawCtx = drawCanvas.getContext('2d');
  drawCtx.strokeStyle = '#1a0a00';
  drawCtx.lineWidth = 4.5;
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';

  const on = (el, evts, fn, opts) => evts.forEach(e => el.addEventListener(e, fn, opts));

  on(drawCanvas, ['touchstart'], e => { e.preventDefault(); const t = e.touches[0]; startDraw(t.clientX, t.clientY); }, {passive:false});
  on(drawCanvas, ['touchmove'],  e => { e.preventDefault(); const t = e.touches[0]; doDraw(t.clientX, t.clientY); }, {passive:false});
  on(drawCanvas, ['touchend'],   e => { e.preventDefault(); stopDraw(); }, {passive:false});
  on(drawCanvas, ['mousedown'],  e => startDraw(e.clientX, e.clientY));
  on(drawCanvas, ['mousemove'],  e => { if (isDrawing) doDraw(e.clientX, e.clientY); });
  on(drawCanvas, ['mouseup','mouseleave'], () => stopDraw());
}

function getXY(clientX, clientY) {
  const r = drawCanvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (drawCanvas.width / r.width),
    y: (clientY - r.top)  * (drawCanvas.height / r.height),
  };
}
function startDraw(cx, cy) {
  isDrawing = true;
  const {x, y} = getXY(cx, cy);
  lastX = x; lastY = y;
  drawCtx.beginPath();
  drawCtx.arc(x, y, 2.5, 0, Math.PI * 2);
  drawCtx.fillStyle = '#1a0a00';
  drawCtx.fill();
}
function doDraw(cx, cy) {
  if (!isDrawing) return;
  const {x, y} = getXY(cx, cy);
  drawCtx.beginPath();
  drawCtx.moveTo(lastX, lastY);
  drawCtx.lineTo(x, y);
  drawCtx.stroke();
  lastX = x; lastY = y;
}
function stopDraw() { isDrawing = false; }
function clearCanvas() {
  if (!drawCtx) return;
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  const g = document.getElementById('canvas-guide');
  if (g) g.style.color = 'rgba(184,134,11,0.08)';
}

/* ─── LIST ─── */
function renderList() {
  const el = document.getElementById('list-content');
  el.innerHTML = '';
  if (currentCategory === '__all__') {
    Object.entries(ALL_WORDS).forEach(([cat, ws]) => {
      const g = document.createElement('div'); g.className = 'list-group';
      g.innerHTML = `<div class="list-group-title">${cat}</div>`;
      const seen = new Set();
      ws.forEach(w => {
        if (seen.has(w.h + w.r)) return; seen.add(w.h + w.r);
        g.appendChild(mkListItem(w));
      });
      el.appendChild(g);
    });
  } else {
    const g = document.createElement('div'); g.className = 'list-group';
    g.innerHTML = `<div class="list-group-title">${currentCategory}</div>`;
    currentWords.forEach((w, i) => {
      const item = mkListItem(w);
      item.onclick = () => { fcIndex = i; setMode('flash'); fcRender(); };
      g.appendChild(item);
    });
    el.appendChild(g);
  }
}

function mkListItem(w) {
  const d = document.createElement('div'); d.className = 'list-item';
  d.innerHTML = `
    <div class="list-hanja">${w.h}</div>
    <div class="list-info">
      <div class="list-reading">${w.r}</div>
      <div class="list-meaning">${w.m}</div>
    </div>
    ${w.pair ? `<div class="list-pair-tag">${w.pair}</div>` : ''}`;
  return d;
}

/* ─── KEYBOARD ─── */
document.addEventListener('keydown', e => {
  if (viewMode === 'flash') {
    if (e.key === 'ArrowRight') fcNext();
    else if (e.key === 'ArrowLeft') fcPrev();
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
    else if (e.key === 'Enter') fcKnown();
  }
});

init();

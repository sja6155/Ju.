<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漢字 암기장</title>
<style>
:root{
  --ink:#1a0a00;--paper:#f5efe3;--red:#c0392b;--gold:#b8860b;
  --gold-light:rgba(184,134,11,0.12);--faded:#8b7355;--card-bg:#fdf8f0;
  --shadow:rgba(26,10,0,0.15);--green:#27ae60;--blue:#2471a3;--purple:#7d3c98;
  --font-sans:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕','NanumGothic','나눔고딕',sans-serif;
  --font-serif:'ApMyungjo','Apple Myungjo','Batang','바탕','NanumMyeongjo','나눔명조',serif;
}
body.dark{
  --ink:#e8dcc8;--paper:#1a1612;--red:#e05c4a;--gold:#d4a017;
  --gold-light:rgba(212,160,23,0.15);--faded:#9e8b6e;--card-bg:#252018;
  --shadow:rgba(0,0,0,0.45);--green:#2ecc71;--blue:#5dade2;--purple:#a569bd;
  background-color:#1a1612;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(212,160,23,.04) 31px,rgba(212,160,23,.04) 32px);
}
body.dark .canvas-wrap{background:#1e1b16;border-color:rgba(212,160,23,.3);}
body.dark .quiz-input{background:#1e1b16;color:var(--ink);border-color:rgba(212,160,23,.3);}
body.dark .mc-btn{background:#1e1b16;color:var(--ink);border-color:rgba(212,160,23,.2);}
body.dark .mc-btn:hover:not(:disabled){background:rgba(212,160,23,.15);}
body.dark .exam-opt-row select,body.dark .exam-opt-row input[type=number]{background:#1e1b16;color:var(--ink);border-color:rgba(212,160,23,.3);}
body.dark .list-item{border-color:rgba(212,160,23,.12);}
body.dark .stats-card{background:#1e1b16;border-color:rgba(212,160,23,.2);}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(–paper);color:var(–ink);font-family:var(–font-sans);min-height:100vh;
display:flex;flex-direction:column;align-items:center;transition:background .3s,color .3s;
background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(139,115,85,.07) 31px,rgba(139,115,85,.07) 32px);}

/* HEADER */
header{width:100%;padding:14px 20px 10px;text-align:center;border-bottom:2px solid var(–gold);
background:var(–card-bg);box-shadow:0 2px 12px var(–shadow);position:sticky;top:0;z-index:200;transition:background .3s;}
.header-inner{position:relative;display:inline-block;}
header h1{font-family:var(–font-serif);font-size:1.45rem;font-weight:900;color:var(–ink);letter-spacing:.1em;}
header p{font-size:.7rem;color:var(–faded);margin-top:2px;}
#theme-btn{position:absolute;top:50%;right:-40px;transform:translateY(-50%);
background:none;border:none;font-size:1.2rem;cursor:pointer;padding:4px;border-radius:50%;line-height:1;}

/* TABS */
.tabs{display:flex;gap:6px;padding:10px 12px 0;max-width:720px;width:100%;margin:0 auto;flex-wrap:wrap;justify-content:center;}
.tab{padding:4px 12px;border-radius:20px;border:1.5px solid var(–gold);background:transparent;
color:var(–gold);font-size:.7rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab.active,.tab:hover{background:var(–gold);color:#fff;}
.tab.fav-tab{border-color:#e67e22;color:#e67e22;}
.tab.fav-tab.active,.tab.fav-tab:hover{background:#e67e22;color:#fff;}
.tab.wrong-tab{border-color:var(–red);color:var(–red);}
.tab.wrong-tab.active,.tab.wrong-tab:hover{background:var(–red);color:#fff;}

/* CONTROLS */
.controls{display:flex;gap:7px;padding:8px 12px;max-width:720px;width:100%;margin:0 auto;align-items:center;flex-wrap:wrap;}
.count-badge{font-size:.7rem;color:var(–faded);margin-left:auto;}
.shuffle-btn{padding:5px 13px;border-radius:20px;border:1.5px solid var(–red);
background:transparent;color:var(–red);font-size:.7rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;}
.shuffle-btn:hover{background:var(–red);color:#fff;}
.mode-toggle{display:flex;background:rgba(139,115,85,.12);border-radius:20px;padding:3px;}
.mode-btn{padding:5px 9px;border-radius:17px;border:none;background:transparent;color:var(–faded);
font-size:.68rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;white-space:nowrap;}
.mode-btn.active{background:var(–gold);color:#fff;}

/* PANELS */
.panel{display:none;width:100%;max-width:500px;margin:0 auto;padding:10px 13px 50px;}
.panel.active{display:block;}
.flex-panel{display:none;width:100%;max-width:500px;margin:0 auto;padding:10px 13px 50px;flex-direction:column;align-items:center;}
.flex-panel.active{display:flex;}
#list-mode.panel.active{max-width:700px;}

/* FLASHCARD */
.progress-bar{width:100%;height:4px;background:rgba(139,115,85,.18);border-radius:2px;margin-bottom:12px;}
.progress-fill{height:100%;background:var(–gold);border-radius:2px;transition:width .3s;}
.card-container{width:100%;perspective:1000px;cursor:pointer;}
.card{width:100%;min-height:240px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.card.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;width:100%;min-height:240px;backface-visibility:hidden;border-radius:16px;
background:var(–card-bg);box-shadow:0 6px 28px var(–shadow),inset 0 0 0 1.5px rgba(184,134,11,.22);
display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px;transition:background .3s;}
.card-face.back{transform:rotateY(180deg);background:var(–card-bg);}
body.dark .card-face.back{background:#1e1b16;}
.card-category{font-size:.6rem;color:var(–faded);letter-spacing:.15em;margin-bottom:8px;}
.card-hanja{font-family:var(–font-serif);font-size:4.5rem;font-weight:400;color:var(–ink);line-height:1;margin-bottom:6px;}
.card-hint{font-size:.64rem;color:var(–faded);margin-top:12px;}
.card-reading{font-size:1.4rem;color:var(–red);font-weight:700;margin-bottom:5px;letter-spacing:.08em;}
.card-meaning{font-size:.95rem;color:var(–ink);font-weight:500;}
.card-pair{font-family:var(–font-serif);font-size:.78rem;color:var(–faded);margin-top:7px;}
.nav-row{display:flex;gap:10px;margin-top:16px;align-items:center;}
.nav-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(–gold);background:var(–card-bg);
color:var(–gold);font-size:1rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:var(–gold);color:#fff;}
.card-num{font-size:.75rem;color:var(–faded);min-width:56px;text-align:center;}
.known-btn{margin-top:12px;padding:7px 20px;border-radius:20px;border:2px solid var(–green);
background:transparent;color:var(–green);font-size:.76rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;}
.known-btn:hover{background:var(–green);color:#fff;}
.known-count{font-size:.7rem;color:var(–green);margin-top:5px;}
.flip-hint{font-size:.63rem;color:var(–faded);margin-top:4px;}

/* QUIZ */
.quiz-type-bar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;width:100%;}
.qtype-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(–blue);background:transparent;
color:var(–blue);font-size:.7rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;}
.qtype-btn.active,.qtype-btn:hover{background:var(–blue);color:#fff;}
.quiz-card{width:100%;border-radius:16px;background:var(–card-bg);
box-shadow:0 6px 28px var(–shadow),inset 0 0 0 1.5px rgba(184,134,11,.18);
padding:22px 16px;display:flex;flex-direction:column;align-items:center;transition:background .3s;}
.quiz-prompt-label{font-size:.6rem;color:var(–faded);letter-spacing:.1em;margin-bottom:6px;text-align:center;}
.quiz-prompt-hanja{font-family:var(–font-serif);font-size:3.8rem;font-weight:400;color:var(–ink);line-height:1;margin-bottom:4px;}
.quiz-prompt-text{font-size:1.1rem;color:var(–ink);font-weight:600;margin:2px 0;text-align:center;}
.quiz-input-row{display:flex;gap:7px;width:100%;margin-top:10px;}
.quiz-input{flex:1;padding:9px 13px;border-radius:10px;border:1.5px solid rgba(184,134,11,.3);
background:var(–card-bg);font-size:.95rem;font-family:var(–font-sans);color:var(–ink);outline:none;transition:background .3s,color .3s;}
.quiz-input:focus{border-color:var(–gold);box-shadow:0 0 0 3px rgba(184,134,11,.1);}
.quiz-submit{padding:9px 15px;border-radius:10px;border:none;background:var(–gold);color:#fff;
font-size:.82rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;white-space:nowrap;}
.quiz-submit:hover{background:#9a6e09;}
.mc-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-top:12px;}
.mc-btn{padding:12px 10px;border-radius:12px;border:1.5px solid rgba(184,134,11,.25);
background:var(–card-bg);color:var(–ink);font-size:.88rem;font-family:var(–font-sans);
cursor:pointer;transition:all .18s;text-align:center;line-height:1.3;}
.mc-btn:hover:not(:disabled){border-color:var(–gold);background:var(–gold-light);}
.mc-btn.correct-ans{background:rgba(39,174,96,.15)!important;border-color:var(–green)!important;color:var(–green)!important;font-weight:700;}
.mc-btn.wrong-ans{background:rgba(192,57,43,.1)!important;border-color:var(–red)!important;color:var(–red)!important;}
.mc-btn:disabled{cursor:default;}
.canvas-wrap{position:relative;margin-top:10px;border:2px solid rgba(184,134,11,.35);border-radius:12px;
background:var(–card-bg);overflow:hidden;touch-action:none;cursor:crosshair;width:100%;max-width:260px;transition:background .3s;}
.canvas-wrap canvas{display:block;width:100%;height:auto;}
.canvas-guide{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;
font-family:var(–font-serif);font-size:5rem;font-weight:400;user-select:none;transition:color .4s;}
.canvas-btns{display:flex;gap:7px;margin-top:7px;width:100%;max-width:260px;}
.canvas-btn{flex:1;padding:7px;border-radius:9px;border:1.5px solid var(–faded);background:transparent;
color:var(–faded);font-size:.72rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;}
.canvas-btn:hover{background:var(–faded);color:#fff;}
.canvas-btn.primary{border-color:var(–gold);color:var(–gold);}
.canvas-btn.primary:hover{background:var(–gold);color:#fff;}
.quiz-feedback{margin-top:10px;width:100%;padding:10px 14px;border-radius:11px;
font-size:.86rem;font-weight:600;text-align:center;display:none;line-height:1.5;}
.quiz-feedback.correct{background:rgba(39,174,96,.1);color:var(–green);border:1.5px solid rgba(39,174,96,.25);}
.quiz-feedback.wrong{background:rgba(192,57,43,.08);color:var(–red);border:1.5px solid rgba(192,57,43,.2);}
.quiz-feedback.neutral{background:var(–gold-light);color:var(–gold);border:1.5px solid rgba(184,134,11,.28);}
.quiz-nav-row{display:flex;align-items:center;margin-top:10px;width:100%;}
.quiz-score{font-size:.73rem;color:var(–faded);}
.hint-reveal{margin-top:8px;font-size:.74rem;color:var(–faded);cursor:pointer;text-decoration:underline dotted;}
.hint-text{display:none;margin-top:4px;font-size:.8rem;color:var(–gold);font-weight:600;}

/* EXAM */
.exam-setup{width:100%;background:var(–card-bg);border-radius:16px;
box-shadow:0 6px 28px var(–shadow),inset 0 0 0 1.5px rgba(184,134,11,.2);padding:24px 18px;transition:background .3s;}
.exam-setup h3{font-family:var(–font-serif);font-size:1.1rem;color:var(–ink);margin-bottom:16px;text-align:center;}
.exam-opt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:.84rem;color:var(–ink);}
.exam-opt-row select,.exam-opt-row input[type=number]{padding:5px 10px;border-radius:8px;border:1.5px solid rgba(184,134,11,.3);
background:var(–card-bg);font-size:.82rem;font-family:var(–font-sans);color:var(–ink);outline:none;transition:background .3s,color .3s;}
.exam-start-btn{width:100%;margin-top:10px;padding:11px;border-radius:12px;border:none;
background:var(–purple);color:#fff;font-size:.9rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;}
.exam-start-btn:hover{opacity:.85;}
.exam-timer{font-size:1.5rem;font-weight:900;color:var(–purple);text-align:center;margin-bottom:10px;letter-spacing:.05em;}
.exam-timer.warning{color:var(–red);}

/* RESULT */
.result-screen{width:100%;text-align:center;padding:26px 18px;background:var(–card-bg);
border-radius:16px;box-shadow:0 6px 28px var(–shadow);transition:background .3s;}
.result-screen h2{font-family:var(–font-serif);font-size:1.3rem;color:var(–ink);margin-bottom:8px;}
.result-big{font-size:2.8rem;font-weight:900;color:var(–gold);line-height:1;}
.result-sub{font-size:.82rem;color:var(–faded);margin-top:6px;}
.result-wrong-list{text-align:left;margin-top:14px;max-height:200px;overflow-y:auto;
border:1px solid rgba(184,134,11,.2);border-radius:10px;padding:8px;}
.result-wrong-item{display:flex;align-items:center;gap:10px;padding:6px 4px;
border-bottom:1px solid rgba(139,115,85,.1);font-size:.8rem;}
.result-wrong-item:last-child{border-bottom:none;}
.rwi-h{font-family:var(–font-serif);font-size:1.4rem;font-weight:400;color:var(–ink);min-width:30px;}
.rwi-info{flex:1;color:var(–faded);}
.result-btn{margin-top:14px;margin-right:5px;padding:8px 18px;border-radius:20px;
border:2px solid var(–gold);background:var(–gold);color:#fff;
font-size:.8rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;}
.result-btn.outline{background:transparent;color:var(–gold);}
.result-btn.wrong-btn{border-color:var(–red);background:var(–red);}
.result-btn:hover{opacity:.85;}

/* LIST */
.list-group{margin-bottom:20px;}
.list-group-title{font-family:var(–font-serif);font-size:.8rem;color:var(–gold);letter-spacing:.1em;
margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid rgba(184,134,11,.2);}
.list-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(–card-bg);
border-radius:10px;margin-bottom:4px;box-shadow:0 2px 6px rgba(26,10,0,.05);
border:1px solid rgba(184,134,11,.13);transition:all .15s;}
.list-item:hover{transform:translateX(3px);border-color:var(–gold);}
.list-hanja{font-family:var(–font-serif);font-size:1.8rem;font-weight:400;color:var(–ink);min-width:38px;text-align:center;}
.list-info{flex:1;cursor:pointer;}
.list-reading{font-size:.85rem;color:var(–red);font-weight:600;}
.list-meaning{font-size:.74rem;color:var(–faded);margin-top:1px;}
.list-pair-tag{font-size:.62rem;background:var(–gold-light);color:var(–gold);padding:2px 7px;border-radius:10px;}
.star-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:2px 4px;line-height:1;transition:transform .15s;}
.star-btn:hover{transform:scale(1.3);}
.wrong-badge{font-size:.6rem;background:rgba(192,57,43,.12);color:var(–red);
padding:2px 6px;border-radius:10px;border:1px solid rgba(192,57,43,.2);margin-left:4px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:16px;}
.stats-card{background:var(–card-bg);border-radius:12px;padding:14px 12px;text-align:center;
border:1px solid rgba(184,134,11,.2);box-shadow:0 2px 8px var(–shadow);transition:background .3s;}
.stats-num{font-size:1.8rem;font-weight:900;color:var(–gold);line-height:1;}
.stats-label{font-size:.68rem;color:var(–faded);margin-top:4px;}
.stats-history{width:100%;background:var(–card-bg);border-radius:12px;padding:14px;
border:1px solid rgba(184,134,11,.2);transition:background .3s;}
.stats-history h4{font-family:var(–font-serif);font-size:.9rem;color:var(–ink);margin-bottom:10px;}
.history-item{display:flex;align-items:center;gap:10px;padding:7px 0;
border-bottom:1px solid rgba(139,115,85,.1);font-size:.78rem;}
.history-item:last-child{border-bottom:none;}
.history-score{font-weight:700;color:var(–gold);min-width:48px;}
.history-meta{flex:1;color:var(–faded);}
.history-grade{font-weight:700;font-size:.85rem;}
.clear-btn{margin-top:12px;padding:7px 16px;border-radius:20px;border:1.5px solid var(–red);
background:transparent;color:var(–red);font-size:.72rem;font-family:var(–font-sans);cursor:pointer;transition:all .2s;}
.clear-btn:hover{background:var(–red);color:#fff;}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(–faded);font-size:.85rem;}
.empty-state .big{font-size:2.5rem;margin-bottom:10px;}
</style>

</head>
<body>

<header>
  <div class="header-inner">
    <h1>漢字 암기장</h1>
    <button id="theme-btn" onclick="toggleTheme()" title="다크/라이트 모드">🌙</button>
  </div>
  <p>한문의 기초 · 병렬관계 · 반의관계 · 속담</p>
</header>

<div class="tabs" id="tabs"></div>

<div class="controls">
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('flash')">플래시카드</button>
    <button class="mode-btn" onclick="setMode('quiz')">퀴즈</button>
    <button class="mode-btn" onclick="setMode('exam')">시험</button>
    <button class="mode-btn" onclick="setMode('list')">목록</button>
    <button class="mode-btn" onclick="setMode('stats')">기록</button>
  </div>
  <button class="shuffle-btn" onclick="shuffle()">🔀 섞기</button>
  <span class="count-badge" id="count-badge"></span>
</div>

<!-- FLASHCARD -->

<div id="flashcard-mode" class="flex-panel active">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="card-container" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face front">
        <div class="card-category" id="fc-cat"></div>
        <div class="card-hanja" id="fc-hanja"></div>
        <div class="card-hint">탭하여 뒤집기 👆</div>
      </div>
      <div class="card-face back">
        <div class="card-category" id="fc-cat-back"></div>
        <div class="card-reading" id="fc-reading"></div>
        <div class="card-meaning" id="fc-meaning"></div>
        <div class="card-pair" id="fc-pair"></div>
      </div>
    </div>
  </div>
  <div class="flip-hint" id="flip-hint"></div>
  <div class="nav-row">
    <button class="nav-btn" onclick="fcPrev()">←</button>
    <div class="card-num" id="fc-num"></div>
    <button class="nav-btn" onclick="fcNext()">→</button>
  </div>
  <button class="known-btn" onclick="fcKnown()">✓ 외웠어요</button>
  <div class="known-count" id="known-count"></div>
</div>

<!-- QUIZ -->

<div id="quiz-mode" class="flex-panel">
  <div class="quiz-type-bar">
    <button class="qtype-btn active" onclick="setQuizType('read')">음 맞추기</button>
    <button class="qtype-btn" onclick="setQuizType('meaning')">뜻 맞추기</button>
    <button class="qtype-btn" onclick="setQuizType('mc')">4지선다</button>
    <button class="qtype-btn" onclick="setQuizType('draw')">한자 쓰기 ✏️</button>
    <button class="qtype-btn" onclick="setQuizType('hanja')">한자 입력</button>
  </div>
  <div id="quiz-body" style="width:100%;"></div>
</div>

<!-- EXAM -->

<div id="exam-mode" class="flex-panel">
  <div id="exam-body" style="width:100%;"></div>
</div>

<!-- LIST -->

<div id="list-mode" class="panel">
  <div id="list-content"></div>
</div>

<!-- STATS -->

<div id="stats-mode" class="flex-panel">
  <div id="stats-body" style="width:100%;"></div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
const ALL_WORDS = {
  "기초 한자":[
    {h:"花",r:"화",m:"꽃"},{h:"開",r:"개",m:"열다"},{h:"讀",r:"독",m:"읽다"},
    {h:"書",r:"서",m:"책/글"},{h:"歸",r:"귀",m:"돌아갈"},{h:"家",r:"가",m:"집"},
    {h:"深",r:"심",m:"깊다"},{h:"海",r:"해",m:"바다"},{h:"希",r:"희",m:"바라다"},
    {h:"望",r:"망",m:"바라다"},{h:"前",r:"전",m:"앞"},{h:"後",r:"후",m:"뒤"},
  ],
  "병렬 관계(유의)":[

const STORE = {
  save(key, val){
    try{ localStorage.setItem('hanja_'+key, JSON.stringify(val)); }catch(e){}
  },
  load(key, def){
    try{
      const v=localStorage.getItem('hanja_'+key);
      return v!=null ? JSON.parse(v) : def;
    }catch(e){ return def; }
  },
  remove(key){ try{ localStorage.removeItem('hanja_'+key); }catch(e){} }
};

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function wordKey(w){ return w.h+w.r; }
function dedupe(arr){
  const seen=new Set();
  return arr.filter(w=>{ const k=wordKey(w); if(seen.has(k)) return false; seen.add(k); return true; });
}
function allWords(){
  return dedupe(Object.entries(ALL_WORDS).flatMap(([cat,ws])=>ws.map(w=>({...w,cat}))));
}
function getFavWords(){ return allWords().filter(w=>favorites.has(wordKey(w))); }
function getWrongWordsList(){ return allWords().filter(w=>wrongWords.has(wordKey(w))); }
function fmtTime(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function fmtDate(ts){ const d=new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

function saveFavorites(){ STORE.save('favorites', [...favorites]); }
function saveWrong(){ STORE.save('wrongWords', [...wrongWords]); }
function saveKnown(){ STORE.save('knownWords', [...knownWords]); }
function saveHistory(){ STORE.save('quizHistory', quizHistory); }

function addHistory(type, correct, total, cat){
  quizHistory.unshift({ date: Date.now(), type, score: correct, total, cat });
  if(quizHistory.length > 50) quizHistory = quizHistory.slice(0,50);
  saveHistory();
}

  isDark = !isDark;

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init(){
  applyTheme();
  buildTabs();
  loadWords();
}

function buildTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML='';
  const mk=(label,cat,cls='')=>{
    const b=document.createElement('button');
    b.className='tab'+cls+(currentCategory===cat?' active':'');
    b.textContent=label;
    b.onclick=()=>{ currentCategory=cat; fcIndex=0; fcKnownSet.clear(); loadWords(); buildTabs(); };
    el.appendChild(b);
  };
  mk('전체','__all__');
  Object.keys(ALL_WORDS).forEach(c=>mk(c,c));
  mk('⭐ 즐겨찾기','__fav__',' fav-tab');
  mk('❌ 오답노트','__wrong__',' wrong-tab');
}

function loadWords(){
  if(currentCategory==='__all__') currentWords=allWords();
  else if(currentCategory==='__fav__') currentWords=getFavWords();
  else if(currentCategory==='__wrong__') currentWords=getWrongWordsList();
  else currentWords=dedupe((ALL_WORDS[currentCategory]||[]).map(w=>({...w,cat:currentCategory})));

  document.getElementById('count-badge').textContent=`총 ${currentWords.length}개`;

  fcKnownSet = new Set([...knownWords].filter(k=>currentWords.some(w=>wordKey(w)===k)));

  fcRender(); renderList();
  qWords=[...currentWords]; qIndex=0; qCorrect=0; qAnswered=false; qDone=false; qSessionWrong=[];
  if(viewMode==='quiz') renderQuiz();
  if(viewMode==='exam') renderExamSetup();
  if(viewMode==='stats') renderStats();
}

function shuffle(){
  currentWords=[...currentWords].sort(()=>Math.random()-.5);
  fcIndex=0;
  qWords=[...currentWords]; qIndex=0; qCorrect=0; qAnswered=false; qDone=false; qSessionWrong=[];
  fcRender(); renderList();
  if(viewMode==='quiz') renderQuiz();
}

function setMode(m){
  viewMode=m;
  const ids=['flashcard','quiz','exam','list','stats'];
  ids.forEach(id=>document.getElementById(id+'-mode').classList.remove('active'));
  document.getElementById(m==='flash'?'flashcard-mode':m+'-mode').classList.add('active');
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{
    b.classList.toggle('active',['flash','quiz','exam','list','stats'][i]===m);
  });
  if(m==='quiz'){ qWords=[...currentWords]; qIndex=0; qCorrect=0; qAnswered=false; qDone=false; qSessionWrong=[]; renderQuiz(); }
  if(m==='exam') renderExamSetup();
  if(m==='stats') renderStats();
}

/* ═══════════════════════════════════════
   FLASHCARD
═══════════════════════════════════════ */
function fcRender(){
  if(!currentWords.length){
    document.getElementById('fc-hanja').textContent='—';
    document.getElementById('fc-num').textContent='0 / 0';
    document.getElementById('known-count').textContent='';
    return;
  }
  const w=currentWords[fcIndex];
  fcFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('fc-cat').textContent=w.cat||'';
  document.getElementById('fc-cat-back').textContent=w.cat||'';
  document.getElementById('fc-hanja').textContent=w.h;
  document.getElementById('fc-reading').textContent=w.r;
  document.getElementById('fc-meaning').textContent=w.m;
  document.getElementById('fc-pair').textContent=w.pair?'관련: '+w.pair:'';
  document.getElementById('fc-num').textContent=`${fcIndex+1} / ${currentWords.length}`;
  document.getElementById('progress-fill').style.width=((fcIndex+1)/currentWords.length*100)+'%';
  document.getElementById('known-count').textContent=`외운 단어: ${fcKnownSet.size} / ${currentWords.length}`;
  document.getElementById('flip-hint').textContent='';
}
function flipCard(){ fcFlipped=!fcFlipped; document.getElementById('card').classList.toggle('flipped'); document.getElementById('flip-hint').textContent=fcFlipped?'탭하여 앞면으로':''; }
function fcNext(){ fcIndex=(fcIndex+1)%currentWords.length; fcRender(); }
function fcPrev(){ fcIndex=(fcIndex-1+currentWords.length)%currentWords.length; fcRender(); }
function fcKnown(){
  const k=wordKey(currentWords[fcIndex]);
  fcKnownSet.add(fcIndex);
  knownWords.add(k);
  saveKnown();
  document.getElementById('known-count').textContent=`외운 단어: ${fcKnownSet.size} / ${currentWords.length}`;
  fcNext();
}

function setQuizType(t){
  qType=t;
  document.querySelectorAll('.qtype-btn').forEach((b,i)=>{
    b.classList.toggle('active',['read','meaning','mc','draw','hanja'][i]===t);
  });

function renderQuiz(){
  const el=document.getElementById('quiz-body');
  if(!qWords.length){ el.innerHTML='<div class="empty-state"><div class="big">📭</div>단어가 없습니다.</div>'; return; }
  if(qDone){ renderQuizResult(el); return; }
  const w=qWords[qIndex];
  let label='',mainHTML='',inputHTML='';

  if(qType==='read'){
    label='이 한자의 음(소리)을 입력하세요';
    mainHTML=`<div class="quiz-prompt-hanja">${w.h}</div>`;
    inputHTML=textInputHTML('음 입력 (예: 화)','quizCheck()');
  } else if(qType==='meaning'){
    label='이 한자의 뜻을 입력하세요';
    mainHTML=`<div class="quiz-prompt-hanja">${w.h}</div>`;
    inputHTML=textInputHTML('뜻 입력 (예: 꽃)','quizCheck()');
  } else if(qType==='mc'){
    label='알맞은 뜻을 고르세요';
    mainHTML=`<div class="quiz-prompt-hanja">${w.h}</div><div style="font-size:.76rem;color:var(--faded);margin-top:2px">음: ${w.r}</div>`;
    inputHTML=mcOptionsHTML(w,'mcSelect','quizMcCorrect');
  } else if(qType==='draw'){
    label='음과 뜻을 보고 한자를 직접 써보세요';
    mainHTML=`<div class="quiz-prompt-text">음: <b style="color:var(--red)">${w.r}</b></div><div class="quiz-prompt-text">뜻: <b>${w.m}</b></div>`;
    inputHTML=canvasHTML(w.h);
  } else {
    label='음과 뜻을 보고 한자를 입력하세요';
    mainHTML=`<div class="quiz-prompt-text">음: <b style="color:var(--red)">${w.r}</b></div><div class="quiz-prompt-text">뜻: <b>${w.m}</b></div>`;
    inputHTML=textInputHTML('한자 입력 (예: 花)','quizCheck()');
  }

  const hintTxt= qType==='read'?'뜻: '+w.m : qType==='meaning'?'음: '+w.r : qType==='draw'?'한자: '+w.h : '한자: '+w.h;

  el.innerHTML=`
    <div class="quiz-card">
      <div class="quiz-prompt-label">${label}</div>
      ${mainHTML}
      ${inputHTML}
      <div class="quiz-feedback" id="qfb"></div>
      ${qType!=='mc'?`<div class="hint-reveal" id="hint-toggle" onclick="toggleHint()">💡 힌트 보기</div><div class="hint-text" id="hint-text">${hintTxt}</div>`:''}
    </div>
    <div class="quiz-nav-row">
      <div class="quiz-score">맞은 개수: ${qCorrect} / ${qIndex} &nbsp;|&nbsp; 오답: ${qSessionWrong.length}</div>
      <div style="flex:1"></div>
      <span style="font-size:.7rem;color:var(--faded)">${qIndex+1} / ${qWords.length}</span>
    </div>`;

  if(qType==='draw') setTimeout(initCanvas,30);
  else setTimeout(()=>{ const i=document.getElementById('quiz-input'); if(i) i.focus(); },50);
}

function textInputHTML(ph, fn){
  return `<div class="quiz-input-row">
    <input class="quiz-input" id="quiz-input" type="text" placeholder="${ph}"
      autocomplete="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')${fn}">
    <button class="quiz-submit" onclick="${fn}">확인</button>
  </div>`;
}

function mcOptionsHTML(w, selectFn, correctFn){
  const pool=allWords();
  const cm=w.m.split('/')[0].trim();
  const others=pool.filter(x=>wordKey(x)!==wordKey(w)&&x.m.split('/')[0].trim()!==cm);
  const seenM=new Set([cm]); const dist=[];
  [...others].sort(()=>Math.random()-.5).forEach(x=>{ if(dist.length>=3) return; const xm=x.m.split('/')[0].trim(); if(!seenM.has(xm)){seenM.add(xm);dist.push(x);} });
  const opts=[w,...dist].sort(()=>Math.random()-.5);

  `</div>`;
}

function initCanvas(){
  drawCanvas=document.getElementById('draw-canvas'); if(!drawCanvas) return;
  drawCtx=drawCanvas.getContext('2d');
  drawCtx.strokeStyle=isDark?'#e8dcc8':'#1a0a00'; drawCtx.lineWidth=4.5; drawCtx.lineCap='round'; drawCtx.lineJoin='round';
  const on=(evts,fn,opts)=>evts.forEach(e=>drawCanvas.addEventListener(e,fn,opts));
  on(['touchstart'],e=>{e.preventDefault();const t=e.touches[0];startDraw(t.clientX,t.clientY);},{passive:false});
  on(['touchmove'], e=>{e.preventDefault();const t=e.touches[0];doDraw(t.clientX,t.clientY);},{passive:false});
  on(['touchend'],  e=>{e.preventDefault();stopDraw();},{passive:false});
  on(['mousedown'], e=>startDraw(e.clientX,e.clientY));
  on(['mousemove'], e=>{if(isDrawing)doDraw(e.clientX,e.clientY);});
  on(['mouseup','mouseleave'],()=>stopDraw());
}
function getXY(cx,cy){ const r=drawCanvas.getBoundingClientRect(); return{x:(cx-r.left)*(drawCanvas.width/r.width),y:(cy-r.top)*(drawCanvas.height/r.height)}; }
function startDraw(cx,cy){ isDrawing=true; const{x,y}=getXY(cx,cy); lastX=x;lastY=y; drawCtx.beginPath(); drawCtx.arc(x,y,2.5,0,Math.PI*2); drawCtx.fillStyle=isDark?'#e8dcc8':'#1a0a00'; drawCtx.fill(); }
function doDraw(cx,cy){ if(!isDrawing) return; const{x,y}=getXY(cx,cy); drawCtx.beginPath(); drawCtx.moveTo(lastX,lastY); drawCtx.lineTo(x,y); drawCtx.stroke(); lastX=x;lastY=y; }
function stopDraw(){ isDrawing=false; }
function clearCanvas(){ if(!drawCtx) return; drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height); const g=document.getElementById('canvas-guide'); if(g) g.style.color='transparent'; }

function renderList(){
  const el=document.getElementById('list-content'); el.innerHTML='';
  if(!currentWords.length){
    el.innerHTML=`<div class="empty-state"><div class="big">${currentCategory==='__fav__'?'⭐':'❌'}</div>${currentCategory==='__fav__'?'즐겨찾기가 비어있어요.<br>목록에서 ☆를 눌러 추가해보세요.':'오답이 없어요.<br>퀴즈를 풀면 자동으로 추가됩니다.'}</div>`;
    return;
  }
  if(currentCategory==='__all__'){
    Object.entries(ALL_WORDS).forEach(([cat,ws])=>{
      const g=document.createElement('div'); g.className='list-group';
      g.innerHTML=`<div class="list-group-title">${cat}</div>`;
      const seen=new Set();
      ws.forEach(w=>{ if(seen.has(w.h+w.r)) return; seen.add(w.h+w.r); g.appendChild(mkListItem({...w,cat})); });
      el.appendChild(g);
    });
  } else {
    const g=document.createElement('div'); g.className='list-group';
    const catLabel=currentCategory==='__fav__'?'⭐ 즐겨찾기':currentCategory==='__wrong__'?'❌ 오답노트':currentCategory;
    g.innerHTML=`<div class="list-group-title">${catLabel}</div>`;
    currentWords.forEach((w,i)=>{ const item=mkListItem(w); item.querySelector('.list-info').onclick=()=>{ fcIndex=i; setMode('flash'); fcRender(); }; g.appendChild(item); });
    el.appendChild(g);
  }
}

function mkListItem(w){
  const d=document.createElement('div'); d.className='list-item';
  const key=wordKey(w);
  const isStarred=favorites.has(key);
  const isWrong=wrongWords.has(key);
  const isKnown=knownWords.has(key);
  d.innerHTML=`
    <div class="list-hanja">${w.h}</div>
    <div class="list-info">
      <div class="list-reading">${w.r}${isWrong?'<span class="wrong-badge">오답</span>':''}${isKnown?' <span style="font-size:.6rem;color:var(--green)">✓</span>':''}</div>
      <div class="list-meaning">${w.m}</div>
    </div>
    ${w.pair?`<div class="list-pair-tag">${w.pair}</div>`:''}
    <button class="star-btn" title="${isStarred?'즐겨찾기 해제':'즐겨찾기 추가'}" onclick="toggleFav(this,'${key}')">${isStarred?'★':'☆'}</button>`;
  return d;
}

function toggleFav(btn, key){
  if(favorites.has(key)){ favorites.delete(key); btn.textContent='☆'; btn.title='즐겨찾기 추가'; }
  else { favorites.add(key); btn.textContent='★'; btn.title='즐겨찾기 해제'; btn.style.transform='scale(1.5)'; setTimeout(()=>btn.style.transform='',200); }
  saveFavorites();
  if(currentCategory==='__fav__'){ currentWords=getFavWords(); document.getElementById('count-badge').textContent=`총 ${currentWords.length}개`; renderList(); }
}

  el.innerHTML=`
    <div class="stats-grid">
      <div class="stats-card"><div class="stats-num">${totalSessions}</div><div class="stats-label">총 학습 횟수</div></div>
      <div class="stats-card"><div class="stats-num">${avgScore}<span style="font-size:1rem">점</span></div><div class="stats-label">평균 점수</div></div>
      <div class="stats-card"><div class="stats-num" style="color:var(--green)">${knownWords.size}</div><div class="stats-label">외운 단어</div></div>
      <div class="stats-card"><div class="stats-num" style="color:var(--red)">${wrongWords.size}</div><div class="stats-label">오답 단어</div></div>
      <div class="stats-card"><div class="stats-num" style="color:#e67e22">${favorites.size}</div><div class="stats-label">즐겨찾기</div></div>
      <div class="stats-card"><div class="stats-num">${totalWords}</div><div class="stats-label">전체 단어</div></div>
    </div>
    <div class="stats-history">
      <h4>📋 최근 학습 기록</h4>
      ${quizHistory.length===0?'<div style="color:var(--faded);font-size:.8rem;text-align:center;padding:16px">아직 기록이 없어요.<br>퀴즈나 시험을 풀어보세요!</div>':
        quizHistory.slice(0,20).map(h=>{
          const pct=Math.round(h.score/h.total*100);
          const grade=pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
          const color=pct>=70?'var(--green)':pct>=50?'var(--gold)':'var(--red)';
          return `<div class="history-item">
            <div class="history-score" style="color:${color}">${pct}점</div>
            <div class="history-meta">${TYPE_LABEL[h.type]||h.type} &nbsp;·&nbsp; ${h.score}/${h.total}<br><span style="font-size:.68rem">${fmtDate(h.date)} &nbsp;${h.cat==='__all__'?'전체':h.cat==='__fav__'?'즐겨찾기':h.cat==='__wrong__'?'오답노트':h.cat}</span></div>
            <div class="history-grade" style="color:${color}">${grade}</div>
          </div>`;
        }).join('')
      }
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
      <button class="clear-btn" onclick="clearWrong()">오답노트 초기화</button>
      <button class="clear-btn" onclick="clearKnown()">외운단어 초기화</button>
      <button class="clear-btn" onclick="clearHistory()">기록 초기화</button>
    </div>`;
}

function clearWrong(){ if(!confirm('오답노트를 초기화할까요?')) return; wrongWords.clear(); saveWrong(); renderStats(); renderList(); }
function clearKnown(){ if(!confirm('외운 단어 기록을 초기화할까요?')) return; knownWords.clear(); saveKnown(); fcKnownSet.clear(); renderStats(); renderList(); fcRender(); }
function clearHistory(){ if(!confirm('학습 기록을 모두 삭제할까요?')) return; quizHistory=[]; saveHistory(); renderStats(); }

/* ═══════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(viewMode==='flash'){
    if(e.key==='ArrowRight') fcNext();
    else if(e.key==='ArrowLeft') fcPrev();
    else if(e.key===' '){ e.preventDefault(); flipCard(); }
    else if(e.key==='Enter') fcKnown();
  }
});

init();
</script>

</body>
</html>
